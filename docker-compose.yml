version: '3.8'

services:
  browser-host:
    build:
      context: .
      dockerfile: Dockerfile
    image: testmw-browser-host
    container_name: testmw_browser_host
    restart: unless-stopped
    env_file:
      - .env
    # /dev/shm defaults to 64 MB — Chromium overflows it and crashes with
    # "Connection closed". Give it 1 GB.
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
